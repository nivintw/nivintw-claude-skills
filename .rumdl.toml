# rumdl (markdown lint/format) config. See https://github.com/rvben/rumdl.

[global]
# Don't enforce a hard line length on prose.
disable = ["MD013"]
# License texts aren't prose to lint. (Per-plugin changelogs from release-please start at
# an H1, so they don't trip MD041 and don't need excluding.)
exclude = ["LICENSE", "LICENSES/**"]

[MD046]
# Always use fenced code blocks (```lang), never 4-space-indented.
style = "fenced"
