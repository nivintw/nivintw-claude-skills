# rumdl (markdown lint/format) config. See https://github.com/rvben/rumdl.

[global]
# Don't enforce a hard line length on prose.
disable = ["MD013"]
# License texts aren't prose to lint, and release-please owns the per-plugin CHANGELOGs —
# it regenerates them with consecutive blank lines (MD012) every release, so linting them
# just fails the release PR's CI. Don't lint generated artifacts.
exclude = ["LICENSE", "LICENSES/**", "**/CHANGELOG.md"]

[MD046]
# Always use fenced code blocks (```lang), never 4-space-indented.
style = "fenced"
