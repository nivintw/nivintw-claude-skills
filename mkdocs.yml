# MkDocs Material config — the one shared "Terminal Slate" theme reused identically across
# every copier-everything-descended repo (fleet-wide docs design; see
# nivintw/repo-management#85 for the full rationale). This file only scaffolds the
# mechanism — real navigation and content are authored per repo by the generate-docs
# skill, not here. theme.features, markdown_extensions, edit_uri, and overrides/404.html
# below now match the fleet-general baseline — this repo proved them out first and they've
# since been folded upstream (nivintw/copier-everything#178).
site_name: "nivintw-claude-skills"
site_description: "Tyler Nivin's Claude Code plugin marketplace."
site_url: "https://nivintw.github.io/nivintw-claude-skills/"
repo_url: "https://github.com/nivintw/nivintw-claude-skills"
repo_name: "nivintw/nivintw-claude-skills"
edit_uri: "edit/main/docs/"

theme:
  name: material
  # overrides/404.html — a custom not-found page. Material treats 404.html as a "static
  # template" rendered straight from the theme, not from a docs/*.md source, so a theme
  # override (not a docs page) is the only way to customize it.
  custom_dir: overrides
  favicon: assets/favicon.svg
  logo: assets/favicon.svg
  features:
    # Copy-to-clipboard on every code block — a small thing, but this is a docs site made
    # almost entirely of shell snippets to paste.
    - content.code.copy
    # Instant navigation (SPA-style: fetches and swaps content instead of a full page
    # reload) + a slim top progress bar for the fetch. This is what actually cashes in the
    # document$-based hydration casts.js/badges.js were already written around — without
    # it those still work (document$ fires once on a normal load too) but every nav is a
    # full reload; with it, every nav re-fires the same hydration on a swapped-in page.
    - navigation.instant
    - navigation.instant.progress
    # Keeps the URL hash in sync with the heading scrolled into view, and a "back to top"
    # button once you've scrolled past the first screen — free wins on any page that runs
    # long, and cost nothing on the ones that don't.
    - navigation.tracking
    - navigation.top
    - toc.follow
    # Search-as-you-type suggestions, query-term highlighting on the result page, and a
    # shareable #search-url — table stakes for a docs site's built-in search.
    - search.suggest
    - search.highlight
    - search.share
    # A small affordance for a reader who spots something to fix: jump straight to this
    # page's source on GitHub (wired via edit_uri below) instead of hunting for the file.
    - content.action.edit
    - content.tooltips
  palette:
    # No `media:` binding on either entry: the FIRST scheme below is what every new visitor
    # sees regardless of OS preference (dark by design, not just by default-detection) — the
    # toggle is what lets a visitor opt into the other one, remembered via local storage.
    - scheme: slate
      primary: black
      accent: light blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: white
      accent: light blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

# Adding this key at all switches MkDocs off its implicit default plugin set (just
# `search`), so `search` is listed explicitly below or built-in search silently
# disappears (nivintw/repo-management#85 fleet epic; #94/#95/#97 for the other three).
plugins:
  - search
  # Per-page "last updated" date derived from git history (nivintw/repo-management#94).
  # Needs full git history to compute correct per-page dates — the reusable Pages build
  # workflow already checks out with fetch-depth: 0 for this reason.
  - git-revision-date-localized:
      type: date
  # Branded social-card (og:image) generation per page (nivintw/repo-management#95).
  # Needs cairosvg + pillow, which need native cairo/freetype libs the reusable Pages
  # build workflow already apt-installs — cairosvg's ctypes loader can't resolve
  # Homebrew's libcairo on macOS, so this can only be verified on the Linux CI build, not
  # a local `mkdocs build`.
  - social
  # Publishes an llms.txt (per https://llmstxt.org/) so LLM tooling can fetch the docs
  # directly instead of scraping themed HTML (nivintw/repo-management#97). `sections`
  # mirrors the nav tree below — kept in sync by hand for now; a future generate-docs run
  # authoring/reorganizing nav should update this list to match.
  - llmstxt:
      sections:
        Documentation:
          - index.md
          - castify.md
          - dev-kit/index.md
          - dev-kit/ship.md
          - dev-kit/land.md
          - dev-kit/review-pr.md
          - dev-kit/generate-docs.md
          - dev-kit/handle-task-tracking.md
          - dev-kit/open-work.md
          - dev-kit/cleanup-locally.md
          - dev-kit/doctor.md
          - dev-kit/pre-public-hardening.md
          - dev-kit/dry-dock-overhaul.md
          - dev-kit/template-reconcile.md
          - worktree-guard.md

# Each addition earns its place with real content it enables, not just because Material
# supports it (still no mermaid, and pymdownx.emoji below is scoped to Material's icon set
# — :material-*:/:octicons-*: glyphs, never an actual emoji face — nothing added for its
# own sake).
markdown_extensions:
  # Material's own icon set (nav icons, admonition icons, the homepage's card grid) — the
  # emoji_index/generator pair is Material's documented way to wire :material-*: glyphs,
  # not a general emoji picker; !!python/name: is a standard PyYAML tag Material's own
  # docs use for this, and check_docs.py's tolerant YAML loader already ignores tags it
  # doesn't need (it only reads docs_dir/nav/exclude_docs/validation).
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  # Callouts (!!! note / !!! tip / ??? details, collapsible) instead of plain blockquotes.
  - admonition
  - pymdownx.details
  # Fenced code blocks that nest cleanly inside an admonition or tab, proper syntax
  # highlighting (line-anchored so a code line is linkable), and inline code that gets the
  # same highlighting treatment as a fenced block. (No Mermaid custom fence on purpose:
  # the site's diagrams are hand-built HTML/CSS components — see assets/diagrams.css —
  # which own their look and stay legible in both color schemes.)
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
  - pymdownx.inlinehilite
  # Content tabs (used on the homepage's install instructions — marketplace vs. local
  # clone) and grid-card layout (`{ .grid .cards }` on the homepage's plugin list), both of
  # which need attr_list to attach a class/id to a Markdown block.
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  # Lets Markdown syntax (bold, code spans, links) work *inside* a raw HTML block — the
  # castify.md cast embed used hand-escaped `<code>` tags before this; now it's plain
  # backtick spans like everywhere else.
  - md_in_html
  - footnotes
  # Shared content fragments (`--8<-- "install.md"`) so e.g. install instructions can't
  # drift between the homepage and per-plugin pages (nivintw/repo-management#96,
  # config-only). base_path is relative to docs/includes/ — a snippet reference is just
  # the filename within that dir, not the full docs/includes/... path.
  - pymdownx.snippets:
      base_path: docs/includes
      check_paths: true
  # Auto-links bare `owner/repo#N` issue/PR references and commit SHAs
  # (nivintw/repo-management#96, config-only).
  - pymdownx.magiclink:
      repo_url_shortener: true
      repo_url_shorthand: true
      user: "nivintw"
      repo: "nivintw-claude-skills"

# MkDocs' own nav/link/anchor validation (1.5+) — declared explicitly rather than relying on
# its undocumented defaults, so `mkdocs build --strict` (generate-docs's SKILL.md Stage 4) is
# the authoritative check for exactly these four things, with check_docs.py as a faster,
# offline-capable pre-check over the same ground.
validation:
  nav:
    omitted_files: warn
    not_found: warn
    absolute_links: warn
  links:
    not_found: warn
    anchors: warn
    absolute_links: warn

# stylesheets/extra.css overrides Material's default `code { word-break: break-word }`,
# which otherwise breaks long identifiers (e.g. `project_name`) mid-word inside narrow
# table columns. The rest are asciinema-player, CDN-hosted (pinned version, not a moving
# tag) rather than vendored — see castify's embedding.md, which permits either; this repo
# opted for the CDN to avoid committing third-party JS/CSS. casts.js hydrates every
# .cast__player mount (see castify.md) via Material's document$ observable, so a page
# navigated to via instant-nav still gets its player.
extra_css:
  - stylesheets/extra.css
  - https://cdn.jsdelivr.net/npm/asciinema-player@3.10.0/dist/bundle/asciinema-player.css
  - assets/casts.css
  - assets/diagrams.css
  - assets/cards.css

# Per-plugin version badges: each docs/versions/<name>.js shim carries one plugin's version
# (bumped independently by release-please — see those files); badges.js hydrates every
# [data-version] element from them. Appended here (not per-page) because MkDocs loads
# extra_javascript site-wide.
extra_javascript:
  - https://cdn.jsdelivr.net/npm/asciinema-player@3.10.0/dist/bundle/asciinema-player.min.js
  - assets/casts.js
  - assets/badges.js
  - versions/castify.js
  - versions/dev-kit.js
  - versions/worktree-guard.js

# Dev-only specs/plans that share the docs/ tree with the published site (the
# superpowers:brainstorming/writing-plans convention, used across every copier-everything
# repo) but were never meant to be site content. generate-docs never touches this
# subtree; excluding it here too is what lets `mkdocs build --strict` pass instead of
# erroring on "exists but not in nav" for every spec/plan file.
#
# includes/ holds pymdownx.snippets fragments (see markdown_extensions above) — they're
# spliced into other pages via `--8<--`, not standalone nav pages, so they're excluded here
# the same way superpowers/ is.
exclude_docs: |
  superpowers/
  includes/

nav:
  - Home: index.md
  - Plugins:
      - castify: castify.md
      - dev-kit:
          - Overview: dev-kit/index.md
          - ship: dev-kit/ship.md
          - land: dev-kit/land.md
          - review-pr: dev-kit/review-pr.md
          - generate-docs: dev-kit/generate-docs.md
          - handle-task-tracking: dev-kit/handle-task-tracking.md
          - open-work: dev-kit/open-work.md
          - cleanup-locally: dev-kit/cleanup-locally.md
          - doctor: dev-kit/doctor.md
          - pre-public-hardening: dev-kit/pre-public-hardening.md
          - dry-dock-overhaul: dev-kit/dry-dock-overhaul.md
          - template-reconcile: dev-kit/template-reconcile.md
      - worktree-guard: worktree-guard.md
