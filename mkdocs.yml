# MkDocs Material config — the one shared "Terminal Slate" theme reused identically across
# every copier-everything-descended repo (fleet-wide docs design; see
# docs/superpowers/specs/2026-07-04-mkdocs-fleet-epic-design.md in the template source for
# the full rationale). This file only scaffolds the mechanism — real navigation and content
# are authored per repo by the generate-docs skill, not here.
site_name: "nivintw-claude-skills"
site_description: "Tyler Nivin's Claude Code plugin marketplace."
site_url: "https://nivintw.github.io/nivintw-claude-skills/"
repo_url: "https://github.com/nivintw/nivintw-claude-skills"
repo_name: "nivintw/nivintw-claude-skills"

theme:
  name: material
  favicon: assets/favicon.svg
  logo: assets/favicon.svg
  features:
    # Copy-to-clipboard on every code block — a small thing, but this is a docs site made
    # almost entirely of shell snippets to paste.
    - content.code.copy
  palette:
    # No `media:` binding on either entry: the FIRST scheme below is what every new visitor
    # sees regardless of OS preference (dark by design, not just by default-detection) — the
    # toggle is what lets a visitor opt into the other one, remembered via local storage.
    - scheme: slate
      primary: black
      accent: light blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: white
      accent: light blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

# A small, safe baseline every real Material site wants: admonition unlocks proper callouts
# (!!! note / !!! tip) instead of plain blockquotes, and pymdownx.superfences is what lets a
# fenced code block nest cleanly inside an admonition. Nothing exotic (no emoji shortcodes,
# no mermaid, no tabs) — kept deliberately minimal.
markdown_extensions:
  - admonition
  - pymdownx.superfences

# MkDocs' own nav/link/anchor validation (1.5+) — declared explicitly rather than relying on
# its undocumented defaults, so `mkdocs build --strict` (generate-docs's SKILL.md Stage 4) is
# the authoritative check for exactly these four things, with check_docs.py as a faster,
# offline-capable pre-check over the same ground.
validation:
  nav:
    omitted_files: warn
    not_found: warn
    absolute_links: warn
  links:
    not_found: warn
    anchors: warn
    absolute_links: warn

# asciinema-player, CDN-hosted (pinned version, not a moving tag) rather than vendored —
# see castify's embedding.md, which permits either; this repo opted for the CDN to avoid
# committing third-party JS/CSS. casts.js hydrates every .cast__player mount (see
# castify.md) via Material's document$ observable, so a page navigated to via instant-nav
# still gets its player.
extra_css:
  - https://cdn.jsdelivr.net/npm/asciinema-player@3.10.0/dist/bundle/asciinema-player.css
  - assets/casts.css

# Per-plugin version badges: each docs/versions/<name>.js shim carries one plugin's version
# (bumped independently by release-please — see those files); badges.js hydrates every
# [data-version] element from them. Appended here (not per-page) because MkDocs loads
# extra_javascript site-wide.
extra_javascript:
  - https://cdn.jsdelivr.net/npm/asciinema-player@3.10.0/dist/bundle/asciinema-player.min.js
  - assets/casts.js
  - assets/badges.js
  - versions/castify.js
  - versions/dev-kit.js
  - versions/worktree-guard.js

# Dev-only specs/plans that share the docs/ tree with the published site (the
# superpowers:brainstorming/writing-plans convention, used across every copier-everything
# repo) but were never meant to be site content. generate-docs never touches this
# subtree; excluding it here too is what lets `mkdocs build --strict` pass instead of
# erroring on "exists but not in nav" for every spec/plan file.
#
# The four legacy *.html pages, and the *.js/*.css assets they load, are the pre-migration
# hand-rolled site, kept (not yet deleted) until the batch Pages-config flip
# (nivintw/repo-management#88) confirms the new MkDocs build is actually live — excluded
# here so the four pages' basename collision with the same-named .md pages doesn't fail the
# strict build in the meantime. Remove this block (and the files themselves) once that issue
# lands.
exclude_docs: |
  superpowers/

  index.html
  castify.html
  dev-kit.html
  worktree-guard.html
  app.js
  style.css
  search-index.js

nav:
  - Home: index.md
  - Plugins:
      - castify: castify.md
      - dev-kit: dev-kit.md
      - worktree-guard: worktree-guard.md
