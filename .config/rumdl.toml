# rumdl (markdown lint/format) config. See https://github.com/rvben/rumdl.

[global]
# Don't enforce a hard line length on prose.
disable = ["MD013"]
# release-please owns CHANGELOG.md and regenerates it with multiple consecutive blank
# lines (MD012) on every release PR; exclude generated changelogs from the prose linter.
exclude = ["LICENSE", "LICENSES/**", "**/CHANGELOG.md"]

[MD046]
# Always use fenced code blocks (```lang), never 4-space-indented.
style = "fenced"

[per-file-ignores]
# MD033 (no inline HTML): the docs site's landing/plugin pages rely on raw HTML passing
# through Markdown unmodified for the per-plugin <span data-version="..."> version badges.
# Scoped to just these files rather than disabled globally, so the rest of the repo's
# Markdown (SKILL.md, README, reference docs) keeps the stricter default.
"docs/*.md" = ["MD033"]
