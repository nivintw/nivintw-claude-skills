# rumdl (markdown lint/format) config. See https://github.com/rvben/rumdl.

[global]
# Don't enforce a hard line length on prose.
disable = ["MD013"]
# release-please owns CHANGELOG.md and regenerates it with multiple consecutive blank
# lines (MD012) on every release PR; exclude generated changelogs from the prose linter.
exclude = ["LICENSE", "LICENSES/**", "**/CHANGELOG.md"]

[MD046]
# Always use fenced code blocks (```lang), never 4-space-indented.
style = "fenced"

[per-file-ignores]
# MD033 (no inline HTML): the docs site's landing/plugin pages rely on raw HTML passing
# through Markdown unmodified for the per-plugin <span data-version="..."> version badges.
# MD046 (fenced over indented): pymdownx.tabbed's content nesting under `=== "tab"` requires
# 4-space indentation, same convention as a list continuation — rumdl's parser sees that
# indentation ahead of an already-fenced block and mistakes the whole thing for an indented
# code block, then "fixes" it by wrapping the tab's prose in stray fences too, destroying
# the tab structure (confirmed: this is exactly what happened to docs/index.md's Install
# tabs the first time the gate ran against them).
# MD025 (single H1): rumdl counts a frontmatter `title:` key as an implicit top-level
# heading, so a page carrying both `title:` (controls the browser tab/nav label — see
# docs/dev-kit/*.md) and a real `# heading` in the body (the page's actual visible title —
# MkDocs never auto-renders frontmatter title into the body) reads as two H1s to rumdl. It
# "fixed" this the first time the gate ran by demoting every affected page's visible heading
# to H2, silently breaking their visual hierarchy — reverted by hand, then this added.
# MD037 (spaces inside emphasis): the command pages list natural-language utterances as
# adjacent italic runs — *"land it"*, *"land PR #42"* — and rumdl's parser misreads the
# `*, *` between two runs as emphasis markers wrapping ", ". Its auto-fix then deletes the
# separator spaces, mangling the rendered sentence.
# All four scoped to just these files rather than disabled globally, so the rest of the
# repo's Markdown (SKILL.md, README, reference docs) keeps the stricter default.
# Both glob forms on purpose: `**` needs a newer rumdl than the pinned pre-commit hook may
# ship, and the explicit subdir glob keeps the ignore working either way. A new docs
# subdirectory needs its own entry until the hook's rumdl understands `**`.
"docs/*.md" = ["MD033", "MD046", "MD025", "MD037"]
"docs/dev-kit/*.md" = ["MD033", "MD046", "MD025", "MD037"]
"docs/**/*.md" = ["MD033", "MD046", "MD025", "MD037"]
