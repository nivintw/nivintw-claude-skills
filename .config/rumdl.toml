# rumdl (markdown lint/format) config. See https://github.com/rvben/rumdl.

[global]
# Don't enforce a hard line length on prose.
# MD033 (no inline HTML): the MkDocs docs site relies on raw HTML passing through Markdown
# unmodified — castify's <figure class="cast"> embeds and the per-plugin <span
# data-version="..."> version badges both need it. Disabled rather than worked around.
disable = ["MD013", "MD033"]
# release-please owns CHANGELOG.md and regenerates it with multiple consecutive blank
# lines (MD012) on every release PR; exclude generated changelogs from the prose linter.
exclude = ["LICENSE", "LICENSES/**", "**/CHANGELOG.md"]

[MD046]
# Always use fenced code blocks (```lang), never 4-space-indented.
style = "fenced"
