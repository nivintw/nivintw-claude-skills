# Thin caller: the actual MkDocs build-and-deploy logic lives in ONE place —
# nivintw/repo-management's reusable workflow — so a `mkdocs`/`mkdocs-material` version
# bump is one Renovate PR for the whole fleet, not one per repo. `pages: write` +
# `id-token: write` are declared here (not inside the reusable workflow) because GitHub
# requires the CALLING workflow to grant the permissions a reusable workflow's jobs use.
#
# Pinned to a commit (zizmor's blanket unpinned-uses policy), not a tag — repo-management
# has no release process for this workflow, so Renovate tracks and bumps the digest instead,
# same as it does for every other `uses:` pin in this file (see main.yml/docs on Renovate's
# GitHub Actions digest-pinning).
#
# MANUAL TRIGGER ONLY, for now: repo-management's `.github/workflows/docs.yml` exists and
# this repo's build already works (verified via mkdocs build --strict + a live preview) —
# the reusable workflow itself (nivintw/repo-management#86) is no longer what's blocking a
# `push` trigger. What's still pending is the batch Pages-source flip across the whole fleet
# (nivintw/repo-management#88): until that lands, this repo's Pages source still points at
# the legacy hand-rolled site, so an automatic deploy here would build the new site but never
# actually serve it. Add the `push` trigger back once #88 flips this repo's Pages source.
name: docs

on:
  workflow_dispatch:

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    permissions:
      contents: read
      pages: write
      id-token: write
    uses: nivintw/repo-management/.github/workflows/docs.yml@864420032528f0d7339fe07a44630b620f16d88b # main
