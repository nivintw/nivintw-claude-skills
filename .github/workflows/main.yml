# Main pipeline: on every push to main, run the SAME quality gate as PRs, then — only
# here — release-please (gated by `needs: ci`).
#
# RELEASE FLOW (release-please, manifest mode — per-plugin independent versions):
#   1. On push to main, release-please scans conventional commits per package path
#      (.config/release-please-config.json) and maintains a per-plugin "Release PR" that
#      bumps that plugin's .claude-plugin/plugin.json + its CHANGELOG.md. Versions of record
#      live in .config/.release-please-manifest.json.
#   2. Each per-plugin Release PR is auto-merged (`--auto --rebase`) once its required
#      check (`ci / lint-and-test`) passes, so releases are continuous AND independent per
#      plugin — a fix to one plugin doesn't drag the others. Merging a Release PR is what
#      publishes: release-please then cuts the annotated tag `<plugin>-v<version>` and the
#      GitHub Release for that plugin.
#   3. The action authenticates as the release GitHub App (see below). An App token is a
#      distinct actor, so — unlike the default GITHUB_TOKEN — the Release PRs run CI and
#      the merge triggers downstream workflows.
#
# REPO SETUP TO ENABLE RELEASES (the release job SKIPS cleanly until these exist, so
# merging to main is always safe — see the `preflight` job below):
#   - A release GitHub App with Contents: Read+write AND Pull requests: Read+write,
#     installed on this repo, and in the bypass list of any ruleset that protects main.
#   - A repository variable CI_CLIENT_ID (the App's Client ID — non-secret) and a
#     repository secret CI_APP_PRIVATE_KEY (the App's private key).
#   - "Allow auto-merge" + "Allow rebase merging" enabled, and the ruleset gating main on
#     REQUIRED STATUS CHECKS (`--auto` needs >=1 required check; a required approving review
#     works only with approve-bot-prs.yml configured — the App can't approve its own Release
#     PR). The auto-merge step uses `--rebase`.
#   - If you don't want app releases, pass a PAT as `token` instead, or delete this job.
#     For Release PRs you'd rather merge by hand, drop the "Auto-merge" step below.

name: main

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

# Serialize release runs so overlapping merges can't race release-please.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ci:
    uses: ./.github/workflows/ci.yml
    # release-please's bump commit was already validated as the Release PR, so skip the heavy
    # gate when it lands on main — the ci job still succeeds, so `needs: ci` and the release
    # job are unaffected. Scope to `push` (head_commit is absent on workflow_dispatch, which
    # then runs the full gate) and anchor on release-please's exact bump-commit prefix
    # (`chore(main): release ` — scope + colon-space, so the value must be quoted) so an
    # innocent human commit like `chore: release notes cleanup` doesn't skip the gate.
    with:
      skip-quality-gate: "${{ github.event_name == 'push' && startsWith(github.event.head_commit.message, 'chore(main): release ') }}"

  # Guard: the release job needs the App's Client ID + private key. A secret can't be read
  # in a job-level `if:`, so a step (which CAN see them) reports whether BOTH are present,
  # and the release job gates on that output. Until both are set, release SKIPS cleanly
  # (green run, no failure); set them and auto-release activates itself.
  preflight:
    runs-on: ubuntu-latest
    outputs:
      release_enabled: ${{ steps.check.outputs.enabled }}
    steps:
      - id: check
        env:
          CI_CLIENT_ID: ${{ vars.CI_CLIENT_ID }}
          CI_APP_PRIVATE_KEY: ${{ secrets.CI_APP_PRIVATE_KEY }}
        run: |
          missing=""
          [ -z "$CI_CLIENT_ID" ] && missing="$missing CI_CLIENT_ID(variable)"
          [ -z "$CI_APP_PRIVATE_KEY" ] && missing="$missing CI_APP_PRIVATE_KEY(secret)"
          if [ -z "$missing" ]; then
            echo "enabled=true" >>"$GITHUB_OUTPUT"
          else
            echo "enabled=false" >>"$GITHUB_OUTPUT"
            echo "::notice::Release skipped — missing:$missing. Set them to enable auto-release."
          fi

  release:
    needs: [ci, preflight]
    if: needs.preflight.outputs.release_enabled == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Mint a token for the release App (the ruleset bypass actor)
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ vars.CI_CLIENT_ID }}
          private-key: ${{ secrets.CI_APP_PRIVATE_KEY }}
          # Scope the token to exactly what release-please needs: the bump commit + tag +
          # release (contents) and the Release PR (pull-requests).
          permission-contents: write
          permission-pull-requests: write

      - name: Run release-please (per-plugin Release PRs, tags, releases)
        id: release
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: .config/release-please-config.json
          manifest-file: .config/.release-please-manifest.json

      # Continuous releases: enable auto-merge (rebase) on EVERY open per-plugin Release PR,
      # so each lands on its own once `ci / lint-and-test` passes. Because this repo uses
      # separate-pull-requests, release-please emits `prs` (a JSON ARRAY of all the open
      # Release PRs) — iterate it; the single-`pr` output would only cover one of N. When
      # there are no Release PRs (a run that only cut releases) `prs` is empty — depending on
      # the action it's either unset or the string `[]`, so the `if:` skips on BOTH. The PR
      # JSON travels via env, never inline `${{ }}`, to dodge script injection. GH_REPO tells
      # gh which repo to act on: this job has no checkout, so without it `gh pr merge` would
      # probe the working dir for a git remote and die. gh reads GH_REPO natively, so no
      # checkout is needed.
      # Tolerate ONLY the documented setup gap — a repo that hasn't turned on "Allow
      # auto-merge" — by detecting it up front (the repo's allow_auto_merge flag) and warning
      # cleanly. Every OTHER failure (gh API 5xx, auth, a missing required check on main)
      # then reddens the job under `set -euo pipefail`, so a stalled release is loud instead
      # of hiding as a ::warning:: on an otherwise-green run.
      # `!= '[]'` is defensive belt-and-suspenders, not load-bearing today: verified against
      # release-please-action v4.4.1's source that `prs` is only ever set (never to `"[]"`)
      # when at least one PR exists — but the action isn't pinned by version, just by commit
      # SHA that Renovate bumps, so this guards against a future release changing that.
      - name: Auto-merge the Release PRs
        if: ${{ steps.release.outputs.prs && steps.release.outputs.prs != '[]' }}
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_PRS: ${{ steps.release.outputs.prs }}
        run: |
          set -euo pipefail
          # Capture jq's output first (not `jq | while`): under `set -e` a jq failure (null /
          # non-array `prs`) aborts the step loudly instead of being swallowed by the pipe and
          # silently enabling auto-merge on nothing. Computed before the auto_merge_allowed
          # check too, so a disabled-auto-merge warning can name the exact PR(s) to merge
          # manually instead of pointing at a discovery step.
          numbers="$(printf '%s' "$RELEASE_PRS" | jq -r '.[].number')"
          # Read the setting in its own statement so a gh API failure here (5xx/auth) trips
          # set -e and reddens the job, rather than the empty result masquerading as "off".
          auto_merge_allowed="$(gh api "repos/${GH_REPO}" --jq '.allow_auto_merge')"
          if [ "$auto_merge_allowed" != "true" ]; then
            # `paste -d` treats a multi-char delimiter as a cycling set of characters, not a
            # literal string, so it'd alternate ',' and ' ' across 3+ items — join on a single
            # char first, then widen it to ", ".
            pr_list="$(echo "$numbers" | sed 's/^/#/' | paste -sd, - | sed 's/,/, /g')"
            echo "::warning::Auto-merge is off for ${GH_REPO}, so Release PR(s) ${pr_list} were left open (merge manually once ready). Enable 'Allow auto-merge' + 'Allow rebase merging' and require a status check on main to automate this."
            exit 0
          fi
          for num in $numbers; do
            gh pr merge "$num" --auto --rebase
          done

      # Deliberately a SECOND step, not folded into the auto-merge above: the two act on
      # Release PRs with fundamentally different inputs, so unifying them would trade an
      # authoritative signal for a heuristic (evaluated and rejected — see below). The
      # auto-merge step reads release-please's OWN `steps.release.outputs.prs` — the exact PRs
      # it created/updated THIS run — which is authoritative for "arm auto-merge on what I just
      # touched." This step instead needs a fresh `gh pr list` scan of ALL open PRs, because a
      # PR stranded DIRTY by a sibling merge may be from a PRIOR run and absent from this run's
      # `prs`. Collapsing both onto one `gh pr list` classifier (DIRTY → close, else →
      # auto-merge) would force the auto-merge half onto the author+label heuristic and lose the
      # authoritative per-run output — a downgrade, not a simplification. Kept as two.
      #
      # This repo runs per-plugin release-please (separate-pull-requests: true, one
      # <plugin>-v<version> Release PR per changed plugin) rather than the template's
      # single-package default, so this guards against exactly the scenario release-please's
      # shared-manifest design creates whenever 2+ Release PRs are open at once: each
      # auto-merge above changes main and every other Release PR's branch now textually
      # conflicts with main on that shared file (mergeStateStatus DIRTY) and can never
      # auto-merge. release-please doesn't refresh a stale branch whose generated content is
      # unchanged — it compares the changes it wants, not branch mergeability — so a DIRTY
      # Release PR never self-heals on its own. Close it instead: closing is release-please's
      # documented regeneration path, so the next run that reaches this component recreates
      # its Release PR from a fresh main (conflict-free), and the auto-merge step above
      # re-arms it. Identified via the same CI_APP_SLUG trust anchor as approve-bot-prs.yml
      # (author login == <slug>[bot]) plus release-please's own `autorelease: pending` label
      # — both more stable than the tool's undocumented branch-naming — and fails closed
      # (no-op) if the variable isn't set, same as that workflow. The label check is literal
      # equality against DIRTY (not "!= CLEAN"): mergeStateStatus is transiently UNKNOWN right
      # after a push, so a just-orphaned PR simply isn't caught this run and converges on a
      # later one instead of being misclassified. This filter only narrows the CANDIDATE set
      # to close, though — a maintainer's manual fixup commit pushed onto the bot's branch
      # doesn't change the PR's (immutable) author field, so the step itself re-checks each
      # candidate's actual commits before closing (see below) rather than trusting this alone.
      - name: Close any stranded (DIRTY) Release PRs so release-please regenerates them
        if: vars.CI_APP_SLUG != ''
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          GH_REPO: ${{ github.repository }}
          CI_APP_SLUG: ${{ vars.CI_APP_SLUG }}
        run: |
          set -euo pipefail
          # Two-phase on purpose. Phase 1 lists open PRs on CHEAP fields only and must NOT
          # request `commits`: `gh pr list --json ...,commits` makes GitHub's GraphQL cost
          # estimator score the nested commits→authors connection across the whole requested
          # page (roughly limit × 100 commits × authors) and REJECT the query before it runs
          # once the page size passes ~50 ("requesting up to N possible nodes ... exceeds the
          # maximum limit of 500,000"). It fails on the query SHAPE, independent of how many PRs
          # or commits actually exist — so requesting commits here reddened this step on
          # essentially every run once CI_APP_SLUG was set. `commits` is fetched per stranded
          # candidate in phase 2 instead (a repo normally has 0-1 stranded Release PRs open at
          # once, so that's a couple of extra calls, not one per open PR).
          # Plain assignment (not `mapfile < <(...)`, a process substitution whose exit status
          # `set -e` can't see) so a `gh pr list` failure (auth, API 5xx) aborts the step loudly
          # instead of silently reading as "none found". --limit raised well past gh's 30-item
          # default so a busier repo's stranded PR can't fall off the first page.
          prs_json="$(gh pr list --state open --limit 100 \
            --json number,author,labels,mergeStateStatus)"
          # Same reasoning as above: a plain assignment (not `mapfile < <(...)`) so a jq
          # failure trips `set -e` too, instead of silently reading as "none found". An empty
          # filter result is a legitimate zero-matches outcome, not a failure — `mapfile` from
          # an empty string yields a one-element array holding "", so that case is normalized
          # back to a true zero-length array below. Literal equality against DIRTY (not
          # "!= CLEAN"): mergeStateStatus is transiently UNKNOWN right after a push, so a
          # just-orphaned PR simply isn't caught this run and converges on a later one rather
          # than being misclassified.
          stranded_str="$(printf '%s' "$prs_json" | jq -r --arg app "${CI_APP_SLUG}[bot]" \
            '.[] | select(.author.login == $app and (.labels[]?.name == "autorelease: pending") and .mergeStateStatus == "DIRTY") | .number')"
          stranded=()
          if [ -n "$stranded_str" ]; then
            mapfile -t stranded <<<"$stranded_str"
          fi
          if [ "${#stranded[@]}" -eq 0 ]; then
            echo "No stranded Release PRs found."
            exit 0
          fi
          for num in "${stranded[@]}"; do
            # Re-fetch mergeStateStatus, commits, AND labels together, from one fresh call,
            # immediately before acting: the initial list above is a snapshot that can go
            # stale mid-batch (e.g. a human pushes a rebase or fixup commit, or strips the
            # autorelease: pending label to signal "leave this alone", between the list and
            # this PR's turn in the loop). Checking these conditions from different reads —
            # some fresh, some stale — would leave exactly the gap this closes: a change
            # landing after the initial list but not flipping mergeStateStatus away from DIRTY
            # would slip past a stale check while still passing a fresh mergeStateStatus
            # recheck. One fresh read backs all three conditions from the original filter.
            # (This full-record re-fetch replaces the cheap phase-1 list's role as the commits
            # source, so no separate commits-only `gh pr view` is needed for the guard below.)
            current_json="$(gh pr view "$num" --json mergeStateStatus,commits,labels)"
            current_status="$(printf '%s' "$current_json" | jq -r '.mergeStateStatus')"
            if [ "$current_status" != "DIRTY" ]; then
              echo "::notice::PR #${num} is no longer DIRTY (now ${current_status}) — skipping, no longer stranded."
              continue
            fi
            has_pending_label="$(printf '%s' "$current_json" | jq -r '[.labels[]?.name] | any(. == "autorelease: pending")')"
            if [ "$has_pending_label" != "true" ]; then
              echo "::notice::PR #${num} no longer carries the autorelease: pending label — skipping, no longer a release-please candidate."
              continue
            fi
            # Never auto-close a stranded PR carrying a human's manual commit: the PR's
            # author field is immutable (release-please's bot login), so a maintainer's
            # fixup pushed directly onto the bot's branch still matches the filter above —
            # closing it under the "release-please will regenerate this PR" message would
            # silently discard those commits, not just an auto-generated bump. Checked from
            # the branch's actual commits (a persistent record, unlike the mutable `author`
            # field) rather than trusting the PR-level author.
            # Fail SAFE (leave open) on any degraded shape this check can't verify, resolving it
            # to a non-empty "unknown-authors" marker rather than an empty string:
            #   - a null/absent `.commits` (whole response degraded), and
            #   - a commit whose `.authors` is empty/null/absent (per-commit degraded) — without
            #     this, that commit's authors iterate to nothing, the list collapses to "", and
            #     the [ -n ] check below reads "" as "verified bot-only" and auto-closes the PR,
            #     discarding a human's commit (the opposite of this guard's fail-safe direction).
            # A naive `.commits[]?`/`.authors[]?` would silently swallow both into "verified
            # bot-only" instead. A commit author with no linked GitHub account comes back with a
            # null OR empty-string `.login` AND/OR `.email`; jq's `//` treats "" as truthy, so
            # guard both null and "" on EACH field before falling through, or a `login: null,
            # email: ""` human commit would collapse to "" and be misread as bot-only. The
            # embedded-newline strip (a commit's `user.name`/`user.email` is attacker-controlled
            # by anyone with push access, and a newline followed by `::` could inject a forged
            # workflow log annotation) is applied by the bash parameter expansion below.
            non_bot_logins="$(printf '%s' "$current_json" | jq -r --arg app "${CI_APP_SLUG}[bot]" \
              'if .commits == null then "unknown-authors (commits field missing from API response)" elif any(.commits[]; (.authors // []) | length == 0) then "unknown-authors (a commit is missing author data)" else ([.commits[].authors[]? | select(.login != $app) | ((.login | select(. != null and . != "")) // (.email | select(. != null and . != "")) // .name // "unknown-author")] | unique | join(", ")) end')"
            if [ -n "$non_bot_logins" ]; then
              # Strip CR/LF from the (attacker-influenceable) author string before echoing it
              # into a ::warning:: — a forged commit author name containing a newline could
              # otherwise inject spurious GitHub Actions workflow-command annotations (log spoof).
              non_bot_logins="${non_bot_logins//[$'\r\n']/ }"
              echo "::warning::Release PR #${num} is DIRTY but carries a commit from ${non_bot_logins} (not just ${CI_APP_SLUG}[bot]) — leaving it open rather than auto-closing, since that would discard those commits. Resolve the conflict manually."
              continue
            fi
            echo "Closing stranded Release PR #${num} (DIRTY against current main)."
            # Tolerate ONLY the expected race (someone/something else already closed or
            # merged it between the list above and this close) so one benign race doesn't
            # abort the rest of the batch; every other failure still reddens the job.
            if ! gh pr close "$num" --comment "Closing — this Release PR's manifest edit now conflicts with main after another same-cycle Release PR merged first. release-please will regenerate this PR from a fresh main next time it runs for this component."; then
              if ! state="$(gh pr view "$num" --json state --jq '.state')"; then
                echo "::error::Could not verify state of PR #${num} after the close attempt above failed." >&2
                exit 1
              fi
              if [ "$state" = "CLOSED" ] || [ "$state" = "MERGED" ]; then
                echo "::notice::PR #${num} was already $(printf '%s' "$state" | tr '[:upper:]' '[:lower:]') before this step could close it — skipping."
                continue
              fi
              echo "::error::Failed to close stranded Release PR #${num} for an unexpected reason." >&2
              exit 1
            fi
          done
