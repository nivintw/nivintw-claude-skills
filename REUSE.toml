version = 1

# .gitignore files (root and nested, e.g. .serena/.gitignore) stay in hawkeye's default
# excludes (not re-included via a negation) and are licensed here instead of via an inline
# header.
[[annotations]]
path = "**/.gitignore"
SPDX-FileCopyrightText = "© 2026 Tyler Nivin"
SPDX-License-Identifier = "MIT"

# The favicon is a graphic asset, not a text file hawkeye can header inline.
[[annotations]]
path = "docs/assets/favicon.svg"
SPDX-FileCopyrightText = "© 2026 Tyler Nivin"
SPDX-License-Identifier = "MIT"

# .cast files are JSON-lines with a leading JSON object — no comment syntax to carry a
# header. Own content (a recording of this repo, not third-party), so same license as
# everything else.
[[annotations]]
path = "**/*.cast"
SPDX-FileCopyrightText = "© 2026 Tyler Nivin"
SPDX-License-Identifier = "MIT"


# The issue-form templates: GitHub's issue-form parser silently rejects a form whose YAML
# begins with a comment (falling back to a blank issue), so these must start with the form
# keys and can't carry an inline SPDX header — hawkeye is told to skip them (see
# .config/licenserc.toml) and they're licensed here instead.
[[annotations]]
path = ".github/ISSUE_TEMPLATE/**"
SPDX-FileCopyrightText = "© 2026 Tyler Nivin"
SPDX-License-Identifier = "MIT"

# The Claude Code guard hooks ship verbatim from the template (no per-file templating), so they
# carry no inline SPDX header and are excluded from hawkeye (see .config/licenserc.toml) —
# licensed here instead.
[[annotations]]
path = ".claude/hooks/**"
SPDX-FileCopyrightText = "© 2026 Tyler Nivin"
SPDX-License-Identifier = "MIT"

# Files that can't carry an SPDX header (no comment syntax / generated). Everything
# else gets a real header from hawkeye (see .config/licenserc.toml).
# Markdown is included here (not headered inline by hawkeye) because this project has
# frontmatter-first markdown where a line-1 SPDX comment would break the YAML.
[[annotations]]
path = ["**/*.json", "**/.vscode/*", "**/*.md"]
SPDX-FileCopyrightText = "© 2026 Tyler Nivin"
SPDX-License-Identifier = "MIT"
