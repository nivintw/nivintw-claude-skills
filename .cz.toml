# commitizen config — standalone so it's language-agnostic (lives here whether or not
# the repo is Python). Its ONLY job here is the commit-msg hook: enforcing Conventional
# Commits + gitmoji (the `cz_gitmoji` rules) via the commitizen pre-commit hook.
#
# Releases are NOT commitizen's job — release-please owns versioning (per-plugin
# .claude-plugin/plugin.json + .release-please-manifest.json; see main.yml). So no
# version-of-record / bump / tag config lives here: `name` is all the linter needs.

[tool.commitizen]
name = "cz_gitmoji"
